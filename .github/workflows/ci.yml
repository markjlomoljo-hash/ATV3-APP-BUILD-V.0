name: CI

on:
  push:
    branches: ["main", "staging", "dev", "feat/phase7-profile-reports"]
  pull_request:
    branches: ["main", "staging", "dev"]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install
      - run: bun run lint
      - run: bun run typecheck
      - run: bun test
      - run: bun run build
