name: CI

on:
  push:
    branches: ["main", "dev", "staging", "feat/**", "fix/**"]
  pull_request:
    branches: ["main", "dev", "staging"]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  app:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun test
      - run: bun run lint
      - run: bun run typecheck
      - run: bun run build
      - run: bun run test:e2e

  ml-service:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install -r ml-service/requirements.txt
      - run: python -m pytest ml-service/tests
